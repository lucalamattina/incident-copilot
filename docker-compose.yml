services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: incident-copilot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_copilot
    # Host port 5433 to avoid colliding with a local Postgres on 5432.
    ports:
      - "5433:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - incident_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incident_copilot"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  incident_pgdata:
